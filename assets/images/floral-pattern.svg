        <circle cx="0" cy="0" r="3" fill="rgba(129,61,110,0.06)"/>
        <ellipse cx="0" cy="-4" rx="2" ry="3"/>
        <ellipse cx="3.5" cy="-2" rx="2" ry="3"/>
        <ellipse cx="3.5" cy="2" rx="2" ry="3"/>
        <ellipse cx="0" cy="4" rx="2" ry="3"/>
        <ellipse cx="-3.5" cy="2" rx="2" ry="3"/>
        <ellipse cx="-3.5" cy="-2" rx="2" ry="3"/>
      </g>
      <g fill="none" stroke="rgba(129,61,110,0.12)" stroke-width="0.5" transform="translate(80,60)">
        <circle cx="0" cy="0" r="2.5" fill="rgba(215,173,205,0.08)"/>
        <ellipse cx="0" cy="-3" rx="1.5" ry="2.5"/>
        <ellipse cx="2.6" cy="-1.5" rx="1.5" ry="2.5"/>
        <ellipse cx="2.6" cy="1.5" rx="1.5" ry="2.5"/>
